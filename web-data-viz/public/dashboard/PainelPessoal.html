<!DOCTYPE html>
<html lang="en">

<head>
     <link rel="shortcut icon" href="../assets/icon/favicon2.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfoClimbing | Quiz</title>


    <link rel="stylesheet" href="./../css/dashboards.css">
    <link rel="stylesheet" href="./../css/estilo.css" />

    <script src="../js/sessao.js"></script>
    <script src="../js/alerta.js"></script>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="janela">
        <div class="header-left">
            <a href="logo">
                <img src="assets/imgs/carabiner.png" alt="icon_logo">
                <h1><span>Info</span>Climbing</h1>
            </a>

            <div class="hello">
                <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
            </div>

            <div class="btn-nav-white">
                <a href="./Quiz.html">
                    <h3>Quiz</h3>
                </a>
            </div>

            <div class="btn-nav">
                <a href="PainelPessoal.html">
                    <h3>Painel Pessoal</h3>
                </a>

            </div>

            <div class="btn-nav-white">
                <a href="PainelGeral.html">
                    <h3>Painel Geral</h3>
                </a>
                
            </div>

            <div class="btn-logout" onclick="limparSessao()">
                <h3>Sair</h3>
            </div>

        </div>

        <div class="dash-content">
            <div class="titulo_painelPessoal">
                <h1>PAINEL PESSOAL</h1>
            </div>
            <div class="box-resultado">
                <h2>Seu Perfil Atual: <span id="span_perfil" style="color: #e3b062;"></span></h2>
            </div>

            <div class="historico-container">
                <h3>Histórico de Tentativas</h3>
                <div id="lista_historico"></div>
            </div>
        </div>
</body>
<script>
    b_usuario.innerHTML = sessionStorage.NOME_USUARIO;

        var idUsuario = sessionStorage.ID_USUARIO;    
        
        fetch("/resultado/listarResultadoMaisRecente/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                idUsuarioServer: idUsuario
            })}).then(function (resposta) {
                resposta.json().then(function (data) {
                    console.log(data)

                    span_perfil.innerHTML = data[0].resultado;
                })
            })

            fetch("/resultado/listarTodosResultadosRecentes/", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
                idUsuarioServer: idUsuario
            })}).then(function (resposta) {
                resposta.json().then(function (data) {
                    console.log(data)

                    lista_historico.innerHTML = '';

                    for (let i = 0; i < data.length; i++) {
                        lista_historico.innerHTML += `Você já foi o escalador: ${data[i].resultado}<br>`;
                    }
                })
            })
        
   
</script>

</html>
