<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Pessoal</title>
</head>

<body>
    <div class="janela">
        <div class="header-left">
            <h1>InfoClimbing</h1>

            <div class="hello">
                <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
            </div>

            <div class="btn-nav-white">
                <a href="./Quiz.html">
                    <h3>Quiz</h3>
                </a>
            </div>

            <div class="btn-nav">
                <a href="dashboard.html">
                    <h3>Painel Geral</h3>
                </a>

            </div>

            <div class="btn-nav-white">
                <h3>Painel Pessoal</h3>
                
            </div>

            <div class="btn-logout" onclick="limparSessao()">
                <h3>Sair</h3>
            </div>

        </div>

        <div class="dash-content">
            <div class="box-resultado">
                <h2>Seu Perfil Atual: <span id="span_perfil" style="color: #e3b062;"></span></h2>
            </div>

            <div class="historico-container">
                <h3>Histórico de Tentativas</h3>
                <div id="lista_historico"></div>
            </div>
        </div>
</body>
<script>
    b_usuario.innerHTML = sessionStorage.NOME_USUARIO;
    // Executa assim que a página carrega
    window.onload = function () {
        exibirResultados();
    };

    function exibirResultados() {
        let ultimo = localStorage.getItem('ultimo_resultado');
        let historico = JSON.parse(localStorage.getItem('historico_quiz')) || [];

        // Exibe o destaque
        if (ultimo) {
            span_perfil.innerHTML = ultimo;
        }

        // Exibe a lista de tentativas
        if (historico.length > 0) {
            lista_historico.innerHTML = "";
            // Fazemos o reverse para a mais recente aparecer primeiro
            historico.reverse().forEach((item, index) => {
                lista_historico.innerHTML += `
                    <div class="item-historico">
                        <p>Tentativa ${historico.length - index}: <b>${item.perfil}</b> - ${item.data}</p>
                    </div>
                `;
            });
        } else {
            lista_historico.innerHTML = "Você ainda não completou nenhum quiz.";
        }
    }
</script>

</html>
