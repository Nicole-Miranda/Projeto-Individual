<body>
    <div class="janela">
        <div class="header-left">
            <h1>InfoClimbing</h1>

            <div class="hello">
                <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
            </div>

            <div class="btn-nav-white">
                <a href="./Quiz.html">
                    <h3>Quiz</h3>
                </a>
            </div>

            <div class="btn-nav">
                <a href="PainelPessoal.html">
                    <h3>Painel Pessoal</h3>

            </div>

            <div class="btn-nav-white">
                <a href="./PainelGeral.html">
                    <h3>Painel Geral</h3>
                </a>
            </div>

            <div class="btn-logout" onclick="limparSessao()">
                <h3>Sair</h3>
            </div>
        </div>

        <div class="kpis">
            <div class="kpi-item">
                <h1 class="titulo-kpi">TITULO</h1>
                <div class="kpi-item-content">
                    <img src="" alt="">
                    <p id="ipt_quantidadeMaior"></p>
                </div>
            </div>
        </div>

        <div class="kpis">
            <div class="kpi-item">
                <h1 class="titulo-kpi">TITULO</h1>
                <div class="kpi-item-content">
                    <img src="" alt="">
                    <p id="ipt_quantidadeMenor"></p>
                </div>
            </div>
        </div>

        <div class="container_charts">

            <div class="top-down">
                <canvas id="rodela"></canvas>
            </div>

            <div class="top-up">
                <canvas id="barras"></canvas>
            </div>
</body>
<script>
    b_usuario.innerHTML = sessionStorage.NOME_USUARIO;

    obterDadosGrafico("rodela");
    obterDadosGraficoBarra("barras");
    function obterDadosGrafico(grafico) {

        fetch(`/resultado/ExibirDadosUsuarios/`, { cache: 'no-store' }).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
                    resposta.reverse();

                    plotarGrafico(resposta, grafico);

                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ gráfico: ${error.message}`);
            });
    }


    function plotarGrafico(resposta, grafico) {

        

        //Dados recebidos: [{"valor_resposta":"Boulder","total":5},{"valor_resposta":"Boulder Outdoor","total":1}]
        let dados = [];

        for (let i = resposta.length - 1; i >= 0; i--) {
            dados.push(resposta[i].total);
        }

        const data = {
            labels: ["Boulder", "Boulder Outdoor", "Indoor", "Tradicional"],
            datasets: [
                {
                    data: dados,
                    backgroundColor: 'rgb(255, 234, 0)'

                }
            ]
        };


        let tipo = '';

        if (grafico == "rodela") {
            tipo = 'doughnut';
        } else {
            tipo = 'bar';
        }
        //Adicionando gráfico criado em div na tela
        let myChart = new Chart(document.getElementById(grafico), {
            type: tipo,
            data: data,
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        position: 'top',
                    },
                    title: {
                        display: true,
                        text: 'AAAAAAA'
                    }
                }
            },
        });

    }

    function obterDadosGraficoBarra(grafico) {
        console.log("TA PASSANDO AQUI?")
        fetch(`/resultado/ExibirDadosUsuarios/`, { cache: 'no-store' }).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
                    resposta.reverse();

                    plotarGraficoBarra(resposta, grafico);

                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ gráfico: ${error.message}`);
            });
    }



    function plotarGraficoBarra(resposta, grafico) {
        console.log("CHEGUEI AQUI?")
      

        //Dados recebidos: [{"valor_resposta":"Boulder","total":5},{"valor_resposta":"Boulder Outdoor","total":1}]
        let dados = [];

        for (let i = resposta.length - 1; i >= 0; i--) {
            dados.push(resposta[i].total);
        }

        const data = {
            labels: ["Boulder", "Boulder Outdoor", "Indoor", "Tradicional"],
            datasets: [
                {
                    data: dados,
                    backgroundColor: 'rgb(255, 234, 0)'

                }
            ]
        };


        let tipo = '';

        if (grafico == "rodela") {
            tipo = 'doughnut';
        } else {
            tipo = 'bar';
        }
        //Adicionando gráfico criado em div na tela
        let myChart = new Chart(document.getElementById(grafico, resposta), {
            type: 'bar',
            data: data,
            options: {
                plugins: {
                    title: {
                        display: false,
                        text: 'LALALALALA'
                    },
                },
                responsive: true,
                interaction: {
                    intersect: false,
                },
                scales: {
                    x: {
                        stacked: true,
                    },
                    y: {
                        stacked: true
                    }
                }
            }

        });
    }

</script>

</html>
